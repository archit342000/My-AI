<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Intelligence | Neural Traffic Monitor</title>

    <link rel="stylesheet" href="/styles.css">

    <!-- Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
        id="highlight-theme">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>

    <link rel="icon" media="(prefers-color-scheme: light)"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%233B82F6'/><stop offset='1' stop-color='%232563EB'/></linearGradient></defs><path d='M16 2L26 12L16 30L6 12Z' fill='url(%23g)'/><path d='M16 2L26 12H6Z' fill='white' opacity='0.25'/><circle cx='16' cy='12' r='2.5' fill='white' opacity='0.9'/></svg>">
    <link rel="icon" media="(prefers-color-scheme: dark)"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%2360A5FA'/><stop offset='1' stop-color='%233B82F6'/></linearGradient></defs><path d='M16 2L26 12L16 30L6 12Z' fill='url(%23g)'/><path d='M16 2L26 12H6Z' fill='white' opacity='0.3'/><circle cx='16' cy='12' r='2.5' fill='white'/></svg>">

    <style>
        /* Logs Specific Styles — Unified Glassmorphism */
        body {
            background: transparent !important;
            color: var(--content-primary);
        }

        .search-area {
            padding: 0 16px 16px;
        }

        .search-container {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            padding: 0 12px;
            transition: border-color 0.2s;
        }

        .search-container:focus-within {
            border-color: var(--color-primary-500);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }

        .search-input {
            background: none;
            border: none;
            color: var(--content-primary);
            padding: 10px;
            font-size: 0.85rem;
            width: 100%;
            outline: none;
            font-family: var(--font-body);
        }

        .nav-tabs {
            display: flex;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            margin: 0 16px 16px;
            padding: 4px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--glass-border);
        }

        .nav-tab {
            flex: 1;
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius-lg);
            transition: var(--ease-spring) 0.2s;
            color: var(--content-muted);
            text-transform: uppercase;
        }

        .nav-tab.active {
            background: var(--accent);
            color: white;
            box-shadow: var(--surface-shadow-intense);
        }

        html.dark .nav-tab.active {
            background: var(--accent);
            color: white;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 16px;
            scrollbar-width: thin;
            scrollbar-color: var(--color-neutral-200) transparent;
        }

        /* Cards */
        .log-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s, background 0.2s, box-shadow 0.2s;
            position: relative;
        }

        .log-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--surface-shadow);
            border-color: var(--color-primary-200);
        }

        html.dark .log-card:hover {
            border-color: rgba(37, 99, 235, 0.3);
            background: rgba(37, 99, 235, 0.05);
        }

        .log-card.active {
            background: rgba(59, 130, 246, 0.08);
            border-color: var(--color-primary-500);
            box-shadow: 0 0 0 2px var(--color-primary-100);
        }

        html.dark .log-card.active {
            background: rgba(37, 99, 235, 0.1);
            border-color: var(--color-primary-500);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .log-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            min-width: 0;
            gap: 8px;
        }

        .pill {
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .pill-llm {
            background: rgba(34, 197, 94, 0.15);
            color: #10b981;
            /* teal-500 */
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .pill-tool {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .pill-error {
            background: rgba(244, 63, 94, 0.15);
            color: var(--color-rose-500);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }

        .pill-debug {
            background: rgba(147, 197, 253, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(147, 197, 253, 0.2);
        }

        .pill-info {
            background: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .pill-warning {
            background: rgba(251, 191, 33, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 33, 0.2);
        }

        .pill-error-lg {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .log-timestamp {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--content-muted);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .log-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--content-primary);
            word-break: break-all;
            overflow-wrap: break-word;
            white-space: normal;
        }

        .log-subtitle {
            font-size: 0.75rem;
            color: var(--content-muted);
            font-family: var(--font-mono);
            word-break: break-all;
            overflow-wrap: break-word;
            white-space: normal;
        }

        /* Detail View Area */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: transparent;
            height: 100vh;
            height: 100svh;
        }

        .detail-header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-header);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            z-index: 10;
        }

        .panes-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border-subtle);
            overflow: hidden;
        }

        @media (max-width: 1024px) {
            .panes-container {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
        }

        .pane {
            background: transparent;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        html.dark .pane {
            background: transparent;
        }

        .pane-header {
            padding: 12px 24px;
            background: var(--surface-secondary);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pane-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--color-primary-600);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        html.dark .pane-title {
            color: var(--color-primary-400);
        }

        .pane-content {
            flex: 1;
            padding: 24px;
            overflow: auto;
            background: var(--surface-secondary) !important;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            scrollbar-width: thin;
            scrollbar-color: var(--color-neutral-600) transparent;
        }

        html.dark .pane-content {
            background: rgba(255, 255, 255, 0.05) !important;
        }

        .pane-content::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .pane-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .pane-content::-webkit-scrollbar-thumb {
            background-color: var(--color-neutral-600);
            border-radius: 10px;
        }

        pre {
            white-space: pre-wrap !important;
            word-wrap: break-word !important;
        }

        pre code {
            font-family: var(--font-mono) !important;
            font-size: 0.85rem !important;
            line-height: 1.6 !important;
            background: transparent !important;
            padding: 0 !important;
            white-space: pre-wrap !important;
            word-break: break-word !important;
        }

        /* Event Log Layout */
        .event-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s var(--ease-spring);
        }

        .event-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--surface-shadow);
            border-color: var(--color-primary-200);
        }

        html.dark .event-card:hover {
            border-color: rgba(37, 99, 235, 0.3);
            background: rgba(37, 99, 235, 0.05);
        }

        .event-card.active {
            background: rgba(59, 130, 246, 0.08);
            border-color: var(--color-primary-500);
            box-shadow: 0 0 0 2px var(--color-primary-100);
        }

        html.dark .event-card.active {
            background: rgba(37, 99, 235, 0.1);
            border-color: var(--color-primary-500);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .event-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            min-width: 0;
            gap: 8px;
        }

        .event-name {
            font-weight: 700;
            color: var(--color-primary-600);
            font-size: 0.85rem;
            word-break: break-all;
            overflow-wrap: break-word;
            white-space: normal;
            margin-right: 8px;
        }

        html.dark .event-name {
            color: var(--color-primary-400);
        }

        .event-data-preview {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--content-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .empty-state-logs {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--content-muted);
            padding: 40px;
            text-align: center;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--content-muted);
            padding: 4px 8px;
            border-radius: var(--radius-md);
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--color-neutral-200);
            color: var(--content-primary);
        }

        html.dark .copy-btn:hover {
            background: var(--color-neutral-800);
            border-color: var(--color-neutral-600);
        }

        /* Layout overrides for logs */
        #app-root {
            display: flex;
            width: 100%;
            height: 100vh;
            height: 100svh;
            overflow: hidden;
        }

        main {
            flex: 1;
            width: 0;
            padding: 0 !important;
            /* Override standard padding */
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100svh;
            position: relative;
            overflow: hidden;
            transition: all 400ms var(--ease-spring);
        }

        @media (min-width: 769px) {
            aside {
                position: relative !important;
                /* Pushes main content instead of overlapping it */
            }
        }

        /* Override sidebar specific for logs */
        .sidebar-header {
            padding: 1rem 1rem;
        }

        .sidebar-collapsed #refresh-btn {
            display: none !important;
        }
    </style>
</head>

<body class="min-h-screen">
    <!-- Ambient Atmospheric Background -->
    <div id="ambient-bg"></div>
    <div id="app-root">
        <!-- Navigation Rail (Resizable) -->
        <aside id="sidebar" class="sidebar-expanded">
            <!-- Precision Drag Handle -->
            <div class="resize-handle" id="sidebar-resizer"></div>

            <div class="sidebar-header">
                <a href="/" class="sidebar-brand" style="text-decoration: none;">
                    <svg class="sidebar-logo-icon" width="22" height="22" viewBox="0 0 32 32" fill="none">
                        <defs>
                            <linearGradient id="brand-grad" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0" stop-color="#3B82F6" />
                                <stop offset="1" stop-color="#1D4ED8" />
                            </linearGradient>
                        </defs>
                        <path d="M16 2L26 12L16 30L6 12Z" fill="url(#brand-grad)" opacity="0.9" />
                        <path d="M16 2L26 12H6Z" fill="white" opacity="0.3" />
                        <circle cx="16" cy="12" r="2.5" fill="white" opacity="0.9" />
                    </svg>
                    <span class="sidebar-brand-text font-heading sidebar-text">Intelligence</span>
                </a>
                <button class="sidebar-icon-btn" onclick="loadData(true)" title="Refresh" id="refresh-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path
                            d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <button id="sidebar-toggle" class="sidebar-icon-btn" title="Toggle sidebar" aria-label="Toggle sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M15 6l-6 6 6 6" id="toggle-icon-path" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>

            <section class="search-area sidebar-text" style="margin-top: 16px;">
                <div class="search-container">
                    <input type="text" id="log-search" class="search-input" placeholder="Filter stream..."
                        oninput="renderList()">
                </div>
            </section>

            <nav class="nav-tabs sidebar-text">
                <div class="nav-tab active" id="tab-network" onclick="switchMode('network')">Network</div>
                <div class="nav-tab" id="tab-events" onclick="switchMode('events')">Events</div>
                <div class="nav-tab" id="tab-app" onclick="switchMode('app')">App Logs</div>
            </nav>

            <div class="list-container custom-scroll sidebar-text" id="log-list">
                <!-- List Items -->
            </div>
        </aside>

        <!-- Main Fluid Content -->
        <main class="content-area" id="detail-view">
            <!-- Mobile Menu Trigger -->
            <button id="mobile-toggle" class="btn-secondary glass" title="Menu" style="position: fixed; z-index: 50;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>

            <div class="empty-state-logs">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                    opacity="0.3" style="margin-bottom: 24px; color: var(--color-primary-500);">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                <h2 class="font-heading"
                    style="font-weight: 600; font-size: 1.5rem; color: var(--content-primary); margin-bottom: 8px;">
                    Select a stream to begin inspection</h2>
                <p style="color: var(--content-muted); max-width: 320px; line-height: 1.6;">Capture neural traffic and
                    system events in
                    high-fidelity resolution.</p>
            </div>
        </main>
    </div>

    <script>
        let currentMode = 'network';
        let networkLogs = [];
        let eventLogs = [];
        let appLogs = [];
        let selectedId = null;

        // Initialize Resizable Sidebar
        const sidebar = document.getElementById('sidebar');
        const handle = document.getElementById('sidebar-resizer');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const mobileToggle = document.getElementById('mobile-toggle');
        const toggleIconPath = document.getElementById('toggle-icon-path');
        let isResizing = false;

        const savedWidth = localStorage.getItem('logs_sidebar_width');
        if (savedWidth && window.innerWidth > 768) sidebar.style.width = savedWidth + 'px';

        handle.addEventListener('mousedown', (e) => {
            isResizing = true;
            sidebar.classList.add('resizing');
            document.body.style.cursor = 'col-resize';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            let newWidth = e.clientX;

            if (newWidth < 120) {
                sidebar.classList.remove('sidebar-expanded');
                sidebar.classList.add('sidebar-collapsed');
                sidebar.style.width = '';
                toggleIconPath.setAttribute('d', 'M9 6l6 6-6 6');
            } else if (window.innerWidth > 768 && newWidth >= 240 && newWidth <= 800) {
                sidebar.classList.remove('sidebar-collapsed');
                sidebar.classList.add('sidebar-expanded');
                sidebar.style.width = newWidth + 'px';
                localStorage.setItem('logs_sidebar_width', newWidth);
                toggleIconPath.setAttribute('d', 'M15 6l-6 6 6 6');
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                sidebar.classList.remove('resizing');
                document.body.style.cursor = 'default';
            }
        });

        // Toggles
        [sidebarToggle, mobileToggle].forEach(btn => {
            btn?.addEventListener('click', () => {
                const isCollapsed = sidebar.classList.contains('sidebar-collapsed');
                sidebar.style.width = '';

                if (isCollapsed) {
                    sidebar.classList.remove('sidebar-collapsed');
                    sidebar.classList.add('sidebar-expanded');
                    toggleIconPath.setAttribute('d', 'M15 6l-6 6 6 6');
                } else {
                    sidebar.classList.remove('sidebar-expanded');
                    sidebar.classList.add('sidebar-collapsed');
                    toggleIconPath.setAttribute('d', 'M9 6l6 6-6 6');
                }
            });
        });

        // Auto-collapse for mobile on load
        if (window.innerWidth <= 768) {
            sidebar.classList.remove('sidebar-expanded');
            sidebar.classList.add('sidebar-collapsed');
            toggleIconPath.setAttribute('d', 'M9 6l6 6-6 6');
        }

        // Theme System
        let themeMode = localStorage.getItem('my_ai_theme_mode') || 'system';
        function applyTheme() {
            let isDark = false;
            if (themeMode === 'system') {
                isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            } else {
                isDark = themeMode === 'dark';
            }

            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }

            const highlightThemeLink = document.getElementById('highlight-theme');
            if (highlightThemeLink) {
                highlightThemeLink.href = isDark
                    ? "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
                    : "https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css";
            }
        }
        applyTheme();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (themeMode === 'system') applyTheme();
        });


        // Data Handling
        async function loadData(force = false) {
            const listDiv = document.getElementById('log-list');

            const networkReady = currentMode === 'network' && networkLogs.length > 0;
            const eventsReady = currentMode === 'events' && eventLogs.length > 0;
            const appReady = currentMode === 'app' && appLogs.length > 0;

            if (!force && (networkReady || eventsReady || appReady)) {
                renderList();
                return;
            }

            try {
                let endpoint;
                if (currentMode === 'network') {
                    endpoint = '/api/logs';
                } else if (currentMode === 'events') {
                    endpoint = '/api/logs/events';
                } else if (currentMode === 'app') {
                    endpoint = '/api/logs/app';
                }

                const res = await fetch(endpoint);
                const data = await res.json();

                if (currentMode === 'network') networkLogs = data;
                else if (currentMode === 'events') eventLogs = data;
                else if (currentMode === 'app') appLogs = data.logs || [];

                renderList();
            } catch (err) {
                listDiv.innerHTML = '<div class="empty-state-logs">Communications Failure.</div>';
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${mode}`).classList.add('active');
            selectedId = null;
            resetDetail();
            loadData();
        }

        window.toggleMobileMenu = function () {
            const sidebar = document.getElementById('sidebar');
            const toggleIconPath = document.getElementById('toggle-icon-path');
            const isCollapsed = sidebar.classList.contains('sidebar-collapsed');
            sidebar.style.width = '';

            if (isCollapsed) {
                sidebar.classList.remove('sidebar-collapsed');
                sidebar.classList.add('sidebar-expanded');
                if (toggleIconPath) toggleIconPath.setAttribute('d', 'M15 6l-6 6 6 6');
            } else {
                sidebar.classList.remove('sidebar-expanded');
                sidebar.classList.add('sidebar-collapsed');
                if (toggleIconPath) toggleIconPath.setAttribute('d', 'M9 6l6 6-6 6');
            }
        };

        function resetDetail() {
            document.getElementById('detail-view').innerHTML = `
                <button id="mobile-toggle" class="btn-secondary glass" title="Menu" style="position: fixed; z-index: 50;" onclick="toggleMobileMenu()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <div class="empty-state-logs">
                    <h2 class="font-heading" style="font-weight: 600; font-size: 1.5rem; margin-bottom: 8px;">Telemetric Silence</h2>
                    <p style="color: var(--content-muted);">Select a trace to open inspection windows.</p>
                </div>
            `;
        }

        function renderList() {
            const listDiv = document.getElementById('log-list');
            const searchTerm = document.getElementById('log-search').value.toLowerCase();
            listDiv.innerHTML = '';

            if (currentMode === 'network') {
                renderNetworkLogs(searchTerm);
            } else if (currentMode === 'events') {
                renderEventLogs(searchTerm);
            } else if (currentMode === 'app') {
                renderAppLogs(searchTerm);
            }
        }

        function renderNetworkLogs(searchTerm) {
            const logs = networkLogs;

            const filtered = logs.filter(log => {
                return log.model_tool.toLowerCase().includes(searchTerm) || log.category.toLowerCase().includes(searchTerm);
            });

            const listDiv = document.getElementById('log-list');
            listDiv.innerHTML = '';

            filtered.forEach((log, index) => {
                const card = document.createElement('div');
                card.className = `log-card ${selectedId === log.log_file ? 'active' : ''}`;
                card.onclick = () => {
                    showNetworkDetail(log, card);
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('sidebar-expanded');
                        sidebar.classList.add('sidebar-collapsed');
                    }
                };

                const time = new Date(log.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

                card.innerHTML = `
                    <div class="log-meta">
                        <span class="pill pill-${log.category}">${log.category}</span>
                        <span class="log-timestamp">${time}</span>
                    </div>
                    <div class="log-title">${escapeHtml(log.model_tool)}</div>
                    <div class="log-subtitle">${log.type || 'blocking'}</div>
                `;
                listDiv.appendChild(card);
            });
        }

        function renderEventLogs(searchTerm) {
            const logs = eventLogs;

            const filtered = logs.filter(log => {
                return log.type.toLowerCase().includes(searchTerm) || JSON.stringify(log.data).toLowerCase().includes(searchTerm);
            });

            const listDiv = document.getElementById('log-list');
            listDiv.innerHTML = '';

            filtered.forEach((log, index) => {
                const card = document.createElement('div');
                const id = log.timestamp + index;
                card.className = `event-card ${selectedId === id ? 'active' : ''}`;
                card.onclick = () => {
                    showEventDetail(log, id, card);
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('sidebar-expanded');
                        sidebar.classList.add('sidebar-collapsed');
                    }
                };

                const time = new Date(log.timestamp).toLocaleTimeString();
                const dataStr = JSON.stringify(log.data);

                card.innerHTML = `
                    <div class="event-top">
                        <span class="event-name">${log.type}</span>
                        <span class="log-timestamp">${time}</span>
                    </div>
                    <div class="event-data-preview">${escapeHtml(dataStr)}</div>
                `;
                listDiv.appendChild(card);
            });
        }

        function renderAppLogs(searchTerm) {
            const logs = appLogs;

            const filtered = logs.filter(log => log.toLowerCase().includes(searchTerm));

            const listDiv = document.getElementById('log-list');
            listDiv.innerHTML = '';

            filtered.forEach((log, index) => {
                const card = document.createElement('div');
                card.className = `event-card ${selectedId === index ? 'active' : ''}`;
                card.onclick = () => {
                    showAppLogDetail(log, index, card);
                    if (window.innerWidth <= 768) {
                        sidebar.classList.remove('sidebar-expanded');
                        sidebar.classList.add('sidebar-collapsed');
                    }
                };

                // Parse log format: timestamp | level | name | message
                const parts = log.split(' | ');
                const time = parts.length > 0 ? parts[0] : '';
                const level = parts.length > 1 ? parts[1] : '';
                const message = parts.slice(2).join(' | '); // Rest is the message

                // Determine pill class based on log level
                let pillClass = 'pill-info';
                if (level) {
                    const levelLower = level.toLowerCase();
                    if (levelLower.includes('debug')) pillClass = 'pill-debug';
                    else if (levelLower.includes('info')) pillClass = 'pill-info';
                    else if (levelLower.includes('warning') || levelLower.includes('warn')) pillClass = 'pill-warning';
                    else if (levelLower.includes('error') || levelLower.includes('exception')) pillClass = 'pill-error-lg';
                }

                card.innerHTML = `
                    <div class="event-top">
                        <span class="pill ${pillClass}">${escapeHtml(level || 'LOG')}</span>
                        <span class="log-timestamp">${escapeHtml(time)}</span>
                    </div>
                    <div class="event-data-preview">${escapeHtml(message)}</div>
                `;
                listDiv.appendChild(card);
            });
        }

        function escapeHtml(text) {
            if (typeof text !== 'string') return text;
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function showNetworkDetail(log, element) {
            selectedId = log.log_file;
            document.querySelectorAll('.log-card').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            const detailView = document.getElementById('detail-view');
            detailView.innerHTML = `
            <button id="mobile-toggle" class="btn-secondary glass" title="Menu" style="position: fixed; z-index: 50;" onclick="toggleMobileMenu()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <div class="empty-state-logs">Streaming Log...</div>`;

            try {
                const res = await fetch(`/api/logs/detail?path=${encodeURIComponent(log.log_file)}`);
                const fullLog = await res.json();

                renderDualPane(escapeHtml(log.model_tool), fullLog.timestamp, fullLog.duration_s, (log.type || 'blocking'), fullLog.request, fullLog.response, fullLog.timings, fullLog.tool_calls);
            } catch (err) {
                detailView.innerHTML = `
                <button id="mobile-toggle" class="btn-secondary glass" title="Menu" style="position: fixed; z-index: 50;" onclick="toggleMobileMenu()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <div class="empty-state-logs">Handshake Failed.</div>`;
            }
        }

        function showEventDetail(log, id, element) {
            selectedId = id;
            document.querySelectorAll('.event-card').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            renderDualPane(log.type, new Date(log.timestamp).toLocaleString(), 0, 'EVENT', {}, log.data);
        }

        function renderDualPane(title, time, duration, mode, req, res, timings, toolCalls = null) {
            const detailView = document.getElementById('detail-view');

            const reqStr = JSON.stringify(req, null, 2);
            let resStr = typeof res === 'string' ? res : JSON.stringify(res, null, 2);
            let isJson = typeof res !== 'string';
            
            let toolCallsHtml = '';
            if (toolCalls && Array.isArray(toolCalls) && toolCalls.length > 0) {
                const tcStr = JSON.stringify(toolCalls, null, 2);
                toolCallsHtml = `
                    <div style="margin-top: 24px;">
                        <div class="pane-header" style="padding: 8px 0; background: transparent; border-bottom: 1px solid var(--border-subtle); margin-bottom: 12px;">
                            <span class="pane-title" style="color: var(--color-primary-500);">Tool Calls</span>
                        </div>
                        <pre><code id="tool-calls-code" style="background:transparent;" class="language-json">${escapeHtml(tcStr)}</code></pre>
                    </div>
                `;
            }

            detailView.innerHTML = `
                <button id="mobile-toggle" class="btn-secondary glass" title="Menu" style="position: fixed; z-index: 50;" onclick="toggleMobileMenu()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <header class="detail-header" style="padding-left: 72px;">
                    <div>
                        <h2 style="font-family: var(--font-mono); color: var(--accent); font-size: 1.1rem; margin:0;">${title}</h2>
                        <p style="margin: 5px 0 0; font-size: 0.75rem; color: var(--content-muted); font-family: var(--font-mono);">${time}</p>
                    </div>
                    <div style="display: flex; gap: 30px;">
                        ${duration ? `<div style="text-align:right"><span style="display:block;font-size:0.6rem;color:var(--content-muted);text-transform:uppercase;font-weight:700;">Compute</span><span style="font-family:var(--font-mono);font-size:0.9rem; color: var(--content-primary);">${duration.toFixed(2)}s</span></div>` : ''}
                        ${timings && timings.predicted_per_second ? `<div style="text-align:right"><span style="display:block;font-size:0.6rem;color:var(--content-muted);text-transform:uppercase;font-weight:700;">Speed</span><span style="font-family:var(--font-mono);font-size:0.9rem; color: var(--content-primary);">${timings.predicted_per_second.toFixed(1)} t/s</span></div>` : ''}
                        <div style="text-align:right"><span style="display:block;font-size:0.6rem;color:var(--content-muted);text-transform:uppercase;font-weight:700;">Mode</span><span style="font-family:var(--font-mono);font-size:0.9rem; color: var(--content-primary);">${mode.toUpperCase()}</span></div>
                    </div>
                </header>
                <div class="panes-container">
                    <section class="pane">
                        <div class="pane-header">
                            <span class="pane-title">Upstream</span>
                            <button class="copy-btn" onclick="copyText('req-code', this)">Copy</button>
                        </div>
                        <div class="pane-content">
                            <pre><code id="req-code" style="background:transparent;" class="language-json">${escapeHtml(reqStr)}</code></pre>
                        </div>
                    </section>
                    <section class="pane">
                        <div class="pane-header">
                            <span class="pane-title">Downstream</span>
                            <button class="copy-btn" onclick="copyText('res-code', this)">Copy</button>
                        </div>
                        <div class="pane-content">
                            <pre><code id="res-code" style="background:transparent;" class="${isJson ? 'language-json' : 'language-markdown'}">${escapeHtml(resStr)}</code></pre>
                            ${toolCallsHtml}
                        </div>
                    </section>
                </div>
            `;

            document.querySelectorAll('pre code').forEach(hljs.highlightElement);
        }

        window.copyText = function (id, btn) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            const old = btn.innerText;
            btn.innerText = 'Copied';
            setTimeout(() => btn.innerText = old, 1500);
        }

        function showAppLogDetail(log, index, element) {
            selectedId = index;
            document.querySelectorAll('.event-card').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            // Parse log format: timestamp | level | name | message
            const parts = log.split(' | ');
            const time = parts.length > 0 ? parts[0] : '';
            const level = parts.length > 1 ? parts[1] : '';
            const name = parts.length > 2 ? parts[2] : '';
            const message = parts.length > 3 ? parts.slice(3).join(' | ') : '';

            const detailView = document.getElementById('detail-view');
            detailView.innerHTML = `
                <button id="mobile-toggle" class="btn-secondary glass" title="Menu" style="position: fixed; z-index: 50;" onclick="toggleMobileMenu()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M3 12h18M3 6h18M3 18h18" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <header class="detail-header" style="padding-left: 72px;">
                    <div>
                        <h2 style="font-family: var(--font-mono); color: var(--accent); font-size: 1.1rem; margin:0;">${escapeHtml(name || 'App Log')}</h2>
                        <p style="margin: 5px 0 0; font-size: 0.75rem; color: var(--content-muted); font-family: var(--font-mono);">${escapeHtml(time)}</p>
                    </div>
                    <div style="display: flex; gap: 30px;">
                        <div style="text-align:right"><span style="display:block;font-size:0.6rem;color:var(--content-muted);text-transform:uppercase;font-weight:700;">Level</span><span style="font-family:var(--font-mono);font-size:0.9rem; color: var(--content-primary);">${escapeHtml(level)}</span></div>
                    </div>
                </header>
                <div class="panes-container">
                    <section class="pane">
                        <div class="pane-header">
                            <span class="pane-title">Log Entry</span>
                            <button class="copy-btn" onclick="copyText('log-content', this)">Copy</button>
                        </div>
                        <div class="pane-content">
                            <pre><code id="log-content" style="background:transparent;" class="language-text">${escapeHtml(log)}</code></pre>
                        </div>
                    </section>
                </div>
            `;

            document.querySelectorAll('pre code').forEach(hljs.highlightElement);
        }

        // Init
        loadData();
    </script>
</body>

</html>
